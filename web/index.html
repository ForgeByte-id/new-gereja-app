<!doctype html>
<html>
  <head>
    <base href="$FLUTTER_BASE_HREF" />

    <meta charset="UTF-8" />
    <meta content="IE=Edge" http-equiv="X-UA-Compatible" />
    <meta
      name="description"
      content="Sistem Informasi Jemaat dan Pelayanan GPI Yehuda."
    />
    <meta name="theme-color" content="#0D3D3A" />

    <!-- iOS meta tags & icons -->
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black" />
    <meta name="apple-mobile-web-app-title" content="GPI Yehuda" />
    <link rel="apple-touch-icon" href="icons/Icon-192.png" />
    <link rel="apple-touch-icon" sizes="512x512" href="icons/Icon-512.png" />

    <!-- iOS splash screen (fallback) -->
    <link
      rel="apple-touch-startup-image"
      href="icons/Icon-512.png"
      media="(device-width: 375px) and (device-height: 812px) and (-webkit-device-pixel-ratio: 3)"
    />

    <!-- Favicon -->
    <link rel="icon" type="image/png" href="favicon.png" />

    <title>GPI Yehuda</title>
    <link rel="manifest" href="manifest.json" />

    <script>
      // --- Service Worker ---
      if ("serviceWorker" in navigator) {
        window.addEventListener("load", () => {
          navigator.serviceWorker.register("service_worker.js");
        });
      }

      // --- PWA Install (Chrome Android only) ---
      // iOS Safari does NOT fire beforeinstallprompt.
      // On iOS, users must tap Share > "Add to Home Screen" manually.
      let deferredPrompt = null;

      window.addEventListener("beforeinstallprompt", (e) => {
        e.preventDefault();
        deferredPrompt = e;
        // Dispatch custom event so Flutter's PwaInstallController can pick it up
        window.dispatchEvent(
          new CustomEvent("pwa-install-ready", { detail: e })
        );
      });

      window.addEventListener("appinstalled", () => {
        deferredPrompt = null;
        window.dispatchEvent(new CustomEvent("pwa-installed"));
      });


    </script>
  </head>
  <body>
    <script src="flutter_bootstrap.js" async></script>
  </body>
</html>
