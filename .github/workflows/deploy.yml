name: Deploy Laravel & Flutter Web

on:
  push:
    branches: [ master ]

jobs:
  # --- STEP 1: TESTING & ANALYSIS ---
  tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      # A. Testing Laravel (PHP)
      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: mbstring, dom, curl, libxml, mysql
          coverage: none

      - name: Install PHP Dependencies
        run: |
          cd api
          mkdir -p bootstrap/cache storage/framework/sessions storage/framework/views storage/framework/cache
          chmod -R 775 bootstrap/cache storage
          composer install --no-progress --no-interaction

      - name: Run PHPUnit Tests
        run: |
          cd api
          # Copy env testing jika ada, kalau tidak pakai .env.example
          cp .env.example .env
          php artisan key:generate
          php artisan test --parallel # Menjalankan test Laravel

      # B. Testing Flutter
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Install Flutter Dependencies
        run: flutter pub get

      - name: Flutter Analyze
        run: flutter analyze # Cek static analysis (linting)

      - name: Flutter Test
        run: flutter test # Jalankan unit test flutter jika ada

  # --- STEP 2: DEPLOY LARAVEL (Hanya jalan jika Test LULUS) ---
  deploy-laravel:
    needs: tests # Wajib nunggu job 'tests' sukses
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Deploy API via SSH
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          key: ${{ secrets.SSH_KEY }}
          script: |
            set -e
            echo "🚀 Starting Laravel API Deployment..."
            APP_ROOT="/var/www/gereja-gpiyehuda"
            
            sudo mkdir -p $APP_ROOT
            sudo chown -R $USER:www-data $APP_ROOT
            cd $APP_ROOT

            git config --global --add safe.directory $APP_ROOT
            if [ ! -d ".git" ]; then
              git clone https://github.com/ForgeByte-id/new-gereja-app.git .
            fi

            git fetch origin master
            git reset --hard origin/master

            cd api
            sudo chown -R $USER:www-data .

            if [ ! -f .env ]; then
              cp .env.production .env || touch .env
            fi

            composer install --no-dev --optimize-autoloader --no-interaction --ignore-platform-reqs
            
            if ! grep -q "^APP_KEY=base64" .env; then
              php artisan key:generate --force
            fi
            
            php artisan migrate --force
            php artisan optimize:clear
            php artisan config:cache
            php artisan route:cache
            
            sudo chgrp -R www-data storage bootstrap/cache
            sudo chmod -R 775 storage bootstrap/cache
            echo "✅ Laravel API Deployed!"

  # --- STEP 3: DEPLOY FLUTTER (Hanya jalan jika Test LULUS) ---
  deploy-flutter:
    needs: tests # Wajib nunggu job 'tests' sukses
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
      
      - name: Build Flutter Web
        run: |
          flutter pub get
          flutter build web --release

      - name: Deploy to VPS (SCP)
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          key: ${{ secrets.SSH_KEY }}
          source: "build/web/*"
          target: "/var/www/new-gpi-yehuda/public_html_tmp"
          strip_components: 2
          rm: true 
          
      - name: Finalize Flutter
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          key: ${{ secrets.SSH_KEY }}
          script: |
            set -e
            sudo rm -rf /var/www/new-gpi-yehuda/public_html
            sudo mkdir -p /var/www/new-gpi-yehuda/public_html
            sudo cp -r /var/www/new-gpi-yehuda/public_html_tmp/. /var/www/new-gpi-yehuda/public_html/
            sudo rm -rf /var/www/new-gpi-yehuda/public_html_tmp
            sudo chown -R www-data:www-data /var/www/new-gpi-yehuda/public_html
            echo "🚀 Flutter Web is live!"