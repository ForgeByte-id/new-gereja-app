name: Deploy Laravel & Flutter Web

on:
  push:
    branches: [ master ]

jobs:
  # --- STEP 1: TESTING & ANALYSIS ---
  tests:
    runs-on: ubuntu-latest
    
    # Menambahkan MariaDB sebagai service agar testing bisa jalan
    services:
      mariadb:
        image: mariadb:10.11
        env:
          MYSQL_ALLOW_EMPTY_PASSWORD: yes
          MYSQL_DATABASE: gereja_api_test
        ports:
          - 3306:3306
        options: --health-cmd="mariadb-admin ping" --health-interval=10s --health-timeout=5s --health-retries=3

    steps:
      - uses: actions/checkout@v3

      # A. Testing Laravel (PHP)
      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: mbstring, dom, curl, libxml, mysql, bcmath
          coverage: none

      - name: Install PHP Dependencies
        run: |
          cd api
          mkdir -p bootstrap/cache storage/framework/sessions storage/framework/views storage/framework/cache
          chmod -R 775 bootstrap/cache storage
          composer install --no-progress --no-interaction

      - name: Run PHPUnit Tests
        run: |
          cd api
          # Gunakan .env.test sebagai dasar
          cp .env.test .env

          php artisan key:generate
          # Jalankan migration sebelum test
          php artisan migrate --force
          php artisan test

      # B. Testing Flutter
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Install Flutter Dependencies
        run: flutter pub get

      - name: Flutter Analyze
        run: flutter analyze

  # --- STEP 2: DEPLOY LARAVEL (Hanya jalan jika Test LULUS) ---
  deploy-laravel:
    needs: tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Deploy API via SSH
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          key: ${{ secrets.SSH_KEY }}
          script: |
            set -e
            echo "🚀 Starting Laravel API Deployment..."
            APP_ROOT="/var/www/gereja-gpiyehuda"
            
            sudo mkdir -p $APP_ROOT
            sudo chown -R $USER:www-data $APP_ROOT
            cd $APP_ROOT

            # Tambahkan safe directory agar git tidak error
            git config --global --add safe.directory $APP_ROOT
            
            if [ ! -d ".git" ]; then
              # Gunakan SSH URL agar tidak ditanya username/password
              git clone git@github.com:ForgeByte-id/new-gereja-app.git .
            fi

            # Pastikan remote menggunakan SSH jika sebelumnya terlanjur HTTPS
            git remote set-url origin git@github.com:ForgeByte-id/new-gereja-app.git

            git fetch origin master
            git reset --hard origin/master

            # MASUK KE FOLDER LARAVEL (API)
            cd api
            
            # Setup Permission awal
            sudo chown -R $USER:www-data .

            if [ ! -f .env ]; then
              cp .env.production .env || touch .env
            fi

            # Install dependencies tanpa dev
            composer install --no-dev --optimize-autoloader --no-interaction --ignore-platform-reqs
            
            # Generate key jika kosong
            if ! grep -q "^APP_KEY=base64" .env; then
              php artisan key:generate --force
            fi
            
            # Jalankan database task
            php artisan migrate --force
            
            # Optimalisasi Cache
            php artisan optimize:clear
            php artisan config:cache
            php artisan route:cache
            
            # Perbaiki Permission Folder Storage & Cache
            sudo chgrp -R www-data storage bootstrap/cache
            sudo chmod -R 775 storage bootstrap/cache
            
            echo "✅ Laravel API Deployed!"

  # --- STEP 3: DEPLOY FLUTTER (Hanya jalan jika Test LULUS) ---
  deploy-flutter:
    needs: tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
      
      - name: Build Flutter Web
        run: |
          flutter pub get
          flutter build web --release

      - name: Deploy to VPS (SCP)
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          key: ${{ secrets.SSH_KEY }}
          source: "build/web/*"
          target: "/var/www/new-gpi-yehuda/public_html_tmp"
          strip_components: 2
          rm: true 
          
      - name: Finalize Flutter
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          key: ${{ secrets.SSH_KEY }}
          script: |
            set -e
            sudo rm -rf /var/www/new-gpi-yehuda/public_html
            sudo mkdir -p /var/www/new-gpi-yehuda/public_html
            sudo cp -r /var/www/new-gpi-yehuda/public_html_tmp/. /var/www/new-gpi-yehuda/public_html/
            sudo rm -rf /var/www/new-gpi-yehuda/public_html_tmp
            sudo chown -R www-data:www-data /var/www/new-gpi-yehuda/public_html
            echo "🚀 Flutter Web is live!"