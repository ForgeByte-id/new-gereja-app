name: Deploy Laravel & Flutter Web

on:
  push:
    branches: [ master ]

jobs:
  # --- STEP 1: TESTING & ANALYSIS ---
  tests:
    runs-on: ubuntu-latest
    
    services:
      mariadb:
        image: mariadb:10.11
        env:
          MYSQL_ALLOW_EMPTY_PASSWORD: yes
          MYSQL_DATABASE: gereja_api_test
        ports:
          - 3306:3306
        options: --health-cmd="mariadb-admin ping" --health-interval=10s --health-timeout=5s --health-retries=3

    steps:
      - uses: actions/checkout@v3

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: mbstring, dom, curl, libxml, mysql, bcmath
          coverage: none

      - name: Install PHP Dependencies
        run: |
          cd api
          mkdir -p bootstrap/cache storage/framework/sessions storage/framework/views storage/framework/cache
          chmod -R 775 bootstrap/cache storage
          composer install --no-progress --no-interaction

      - name: Run PHPUnit Tests
        run: |
          cd api
          # Gunakan .env.test sebagai dasar testing
          if [ -f .env.test ]; then cp .env.test .env; else cp .env.example .env; fi
          
          # Pastikan koneksi ke service MariaDB runner benar
          sed -i 's/DB_CONNECTION=.*/DB_CONNECTION=mysql/g' .env
          sed -i 's/DB_HOST=.*/DB_HOST=127.0.0.1/g' .env
          sed -i 's/DB_PORT=.*/DB_PORT=3306/g' .env
          sed -i 's/DB_DATABASE=.*/DB_DATABASE=gereja_api_test/g' .env
          sed -i 's/DB_USERNAME=.*/DB_USERNAME=root/g' .env
          sed -i 's/DB_PASSWORD=.*/DB_PASSWORD=/g' .env

          php artisan key:generate
          php artisan migrate --force
          php artisan test

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Install Flutter Dependencies
        run: flutter pub get

      - name: Flutter Analyze
        run: flutter analyze

  # --- STEP 2: DEPLOY LARAVEL (Backend) ---
  deploy-laravel:
    needs: tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Deploy API via SSH
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          key: ${{ secrets.SSH_KEY }}
          script: |
            set -e
            echo "🚀 Starting Laravel API Deployment..."
            APP_ROOT="/var/www/gereja-gpiyehuda"
            
            # Pastikan permission folder benar sebelum git command
            sudo chown -R $USER:www-data $APP_ROOT
            
            cd $APP_ROOT

            # Daftarkan directory agar git tidak protes
            git config --global --add safe.directory $APP_ROOT
            
            echo "Pulling latest changes..."
            # Gunakan sudo git jika masih bermasalah, tapi harusnya chown di atas sudah cukup
            git fetch origin master
            git reset --hard origin/master

            cd api
            
            # Pastikan folder storage & cache bisa ditulis Laravel
            sudo chown -R $USER:www-data .
            
            # Install & Optimize
            composer install --no-dev --optimize-autoloader --no-interaction --ignore-platform-reqs
            
            php artisan migrate --force
            php artisan optimize:clear
            
            # Permission Final untuk Web Server
            sudo chmod -R 775 storage bootstrap/cache
            sudo chgrp -R www-data storage bootstrap/cache
            
            echo "✅ Laravel API Deployed Successfully!"

  # --- STEP 3: DEPLOY FLUTTER (Frontend) ---
  deploy-flutter:
    needs: tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
      
      - name: Build Flutter Web
        run: |
          flutter pub get
          flutter build web --release

      - name: Deploy to VPS (SCP)
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          key: ${{ secrets.SSH_KEY }}
          source: "build/web/*"
          target: "/var/www/new-gpi-yehuda/public_html_tmp"
          strip_components: 2
          rm: true 
          
      - name: Finalize Flutter
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          key: ${{ secrets.SSH_KEY }}
          script: |
            set -e
            # Ganti folder public_html dengan build terbaru
            sudo rm -rf /var/www/new-gpi-yehuda/public_html
            sudo mkdir -p /var/www/new-gpi-yehuda/public_html
            sudo cp -r /var/www/new-gpi-yehuda/public_html_tmp/. /var/www/new-gpi-yehuda/public_html/
            sudo rm -rf /var/www/new-gpi-yehuda/public_html_tmp
            sudo chown -R www-data:www-data /var/www/new-gpi-yehuda/public_html
            echo "🚀 Flutter Web is live!"