name: Deploy Laravel & Flutter Web

on:
  push:
    branches:
      - master

jobs:
  # ==========================
  # TEST
  # ==========================
  tests:
    runs-on: ubuntu-latest

    services:
      mariadb:
        image: mariadb:10.11
        env:
          MYSQL_ALLOW_EMPTY_PASSWORD: yes
          MYSQL_DATABASE: gereja_api_test
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mariadb-admin ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=3

    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.4"
          extensions: mbstring, dom, curl, libxml, mysql, bcmath
          coverage: none

      - name: Install Composer Dependencies
        working-directory: api
        run: |
          mkdir -p bootstrap/cache
          mkdir -p storage/framework/cache
          mkdir -p storage/framework/views
          mkdir -p storage/framework/sessions

          chmod -R 775 bootstrap storage

          composer install \
            --no-progress \
            --no-interaction

      - name: Run Laravel Test
        working-directory: api
        run: |

          if [ -f .env.test ]; then
            cp .env.test .env
          else
            cp .env.example .env
          fi

          sed -i 's/^DB_CONNECTION=.*/DB_CONNECTION=mysql/' .env
          sed -i 's/^DB_HOST=.*/DB_HOST=127.0.0.1/' .env
          sed -i 's/^DB_PORT=.*/DB_PORT=3306/' .env
          sed -i 's/^DB_DATABASE=.*/DB_DATABASE=gereja_api_test/' .env
          sed -i 's/^DB_USERNAME=.*/DB_USERNAME=root/' .env
          sed -i 's/^DB_PASSWORD=.*/DB_PASSWORD=/' .env

          php artisan key:generate
          php artisan migrate --force
          php artisan test

      - uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Flutter Analyze
        run: |
          flutter pub get
          flutter analyze

  # ==========================
  # DEPLOY LARAVEL
  # ==========================
  deploy-laravel:
    needs: tests
    runs-on: ubuntu-latest

    steps:
      - name: Deploy Laravel
        uses: appleboy/ssh-action@v1.2.2
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          key: ${{ secrets.SSH_KEY }}

          script: |

            set -e

            APP_ROOT="/var/www/gereja-gpiyehuda"

            echo "===== Laravel Deployment ====="

            cd $APP_ROOT

            git config --global --add safe.directory $APP_ROOT

            git fetch origin master
            git reset --hard origin/master

            cd api

            mkdir -p bootstrap/cache
            mkdir -p storage/framework/cache
            mkdir -p storage/framework/views
            mkdir -p storage/framework/sessions

            chmod -R 775 bootstrap storage

            if [ ! -f .env ]; then
              cp .env.production .env
            fi

            composer install \
              --no-dev \
              --optimize-autoloader \
              --no-interaction

            php artisan migrate --force

            php artisan optimize:clear

            php artisan config:cache
            php artisan route:cache
            php artisan view:cache

            echo "Laravel Deploy Success"

  # ==========================
  # DEPLOY FLUTTER
  # ==========================
  deploy-flutter:
    needs: tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Build Flutter Web
        run: |
          flutter pub get
          flutter build web --release --dart-define=API_BASE_URL=https://api.gereja-gpiyehuda.my.id/api/v1

      - name: Prepare Directory
        uses: appleboy/ssh-action@v1.2.2
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          key: ${{ secrets.SSH_KEY }}
          script: |
            mkdir -p /var/www/new-gpi-yehuda/public_html_tmp

      - name: Upload Flutter
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          key: ${{ secrets.SSH_KEY }}
          source: "build/web/*"
          target: "/var/www/new-gpi-yehuda/public_html_tmp"
          strip_components: 2
          rm: true

      - name: Publish Flutter
        uses: appleboy/ssh-action@v1.2.2
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          key: ${{ secrets.SSH_KEY }}

          script: |

            set -e

            rm -rf /var/www/new-gpi-yehuda/public_html

            mkdir -p /var/www/new-gpi-yehuda/public_html

            cp -r /var/www/new-gpi-yehuda/public_html_tmp/. \
                  /var/www/new-gpi-yehuda/public_html/

            rm -rf /var/www/new-gpi-yehuda/public_html_tmp

            echo "Flutter Deploy Success"
