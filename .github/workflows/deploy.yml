name: Deploy Laravel & Flutter Web

on:
  push:
    branches: [ master ]

jobs:
  deploy-laravel:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Deploy API via SSH
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          key: ${{ secrets.SSH_KEY }}
          script: |
            echo "🚀 Starting Laravel API Deployment (Monorepo)..."
            cd /var/www/gereja-gpiyehuda

            # 1. Sync & Clean Code
            git config --global --add safe.directory /var/www/gereja-gpiyehuda
            git fetch origin master
            git reset --hard origin/master

            # --- POIN PENTING: MASUK KE FOLDER API ---
            cd api 

            # 2. Permissions Setup
            sudo chown -R $USER:www-data .

            # 3. Setup Environment
            if [ ! -f .env ]; then
              echo "📝 Creating .env from .env.production"
              cp .env.production .env
            fi

            # 4. Install Dependencies
            echo "📦 Installing Composer dependencies..."
            composer install --no-dev --optimize-autoloader --no-interaction --ignore-platform-reqs

            # 5. Laravel Optimization
            php artisan key:generate --force --no-interaction
            php artisan migrate --force
            php artisan config:cache
            php artisan route:cache
            
            # 6. Final Permissions
            sudo chgrp -R www-data storage bootstrap/cache
            sudo chmod -R 775 storage bootstrap/cache
            
            echo "✅ Laravel API Deployment Finished!"

  deploy-flutter:
    needs: deploy-laravel # Menunggu API beres dulu
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
      
      - name: Build Flutter Web
        run: |
          echo "🔨 Building Flutter Web Release..."
          flutter pub get
          flutter build web --release

      - name: Deploy to VPS
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          key: ${{ secrets.SSH_KEY }}
          source: "build/web/*"
          target: "/var/www/new-gpi-yehuda/public_html"
          strip_components: 2
          rm: true 
          
      - name: Post-Deploy Clean Up
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          key: ${{ secrets.SSH_KEY }}
          script: |
            echo "🧹 Cleaning up Flutter web permissions..."
            sudo chown -R www-data:www-data /var/www/new-gpi-yehuda/public_html
            echo "🚀 All systems are live!"